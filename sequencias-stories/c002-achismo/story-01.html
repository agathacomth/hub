<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8"><title>C002 · Story 01</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap');
body{width:1080px;height:1920px;background:radial-gradient(ellipse at 50% 40%,#06101f 0%,#020610 100%);font-family:'Inter',system-ui,sans-serif;color:#fff;overflow:hidden;position:relative}
.grid{position:absolute;inset:0;background-image:linear-gradient(rgba(15,37,64,0.2) 1px,transparent 1px),linear-gradient(90deg,rgba(15,37,64,0.2) 1px,transparent 1px);background-size:90px 90px;pointer-events:none}
.frame{position:absolute;inset:0;padding:240px 90px 240px}
.label{font-size:42px;font-weight:500;color:#4dd4ff;letter-spacing:2px;text-transform:uppercase;margin-bottom:24px;font-weight:700}
.intro{font-size:48px;font-weight:500;color:#8b9bb4;line-height:1.3;margin-bottom:80px}
.huge{font-size:380px;font-weight:900;line-height:0.9;color:#4dd4ff;letter-spacing:-0.06em;margin-bottom:60px}
.after{font-size:48px;font-weight:700;color:#fff;line-height:1.3;margin-bottom:50px}
.note{font-size:30px;font-weight:400;color:#8b9bb4;font-style:italic}
.logo{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);width:280px}
.logo img{width:100%;height:auto;display:block}
</style></head>
<body>
<div class="grid"></div>
<div class="frame">
  <div class="label">— DADO DA BASE</div>
  <div class="intro">Em 199 das últimas 295 reuniões<br>com donos de restaurante,</div>
  <div class="huge">67%</div>
  <div class="after">começaram a conversa com<br>a <span style="color:#4dd4ff">mesma frase</span>.</div>
  <div class="note">(você provavelmente já falou ela essa semana.)</div>
</div>
<div class="logo"><img src="../../png/logo.png" alt="Koncluí"/></div>
</body></html>
