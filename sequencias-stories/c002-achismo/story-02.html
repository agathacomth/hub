<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8"><title>C002 · Story 02</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap');
body{width:1080px;height:1920px;background:radial-gradient(ellipse at 50% 40%,#06101f 0%,#020610 100%);font-family:'Inter',system-ui,sans-serif;color:#fff;overflow:hidden;position:relative}
.grid{position:absolute;inset:0;background-image:linear-gradient(rgba(15,37,64,0.2) 1px,transparent 1px),linear-gradient(90deg,rgba(15,37,64,0.2) 1px,transparent 1px);background-size:90px 90px;pointer-events:none}
.frame{position:absolute;inset:0;padding:280px 90px 240px}
.intro{font-size:46px;font-weight:400;color:#8b9bb4;margin-bottom:20px}
.quote-mark{font-family:Georgia,serif;font-size:240px;line-height:0.6;color:#4dd4ff;opacity:0.7}
.headline{font-size:140px;font-weight:900;line-height:1.0;letter-spacing:-0.03em;margin:30px 0;color:#fff}
.right{display:flex;justify-content:flex-end;margin-top:-60px;margin-right:60px}
.note{font-size:38px;font-weight:500;color:#8b9bb4;line-height:1.4;margin-top:100px}
.logo{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);width:280px}
.logo img{width:100%;height:auto;display:block}
</style></head>
<body>
<div class="grid"></div>
<div class="frame">
  <div class="intro">A frase é essa:</div>
  <div class="quote-mark">&ldquo;</div>
  <div class="headline">Eu acho<br>que fizeram.</div>
  <div class="right"><div class="quote-mark">&rdquo;</div></div>
  <div class="note">Cinco palavras que custam mais caro pro seu lucro<br>do que qualquer fornecedor.</div>
</div>
<div class="logo"><img src="../../png/logo.png" alt="Koncluí"/></div>
</body></html>
