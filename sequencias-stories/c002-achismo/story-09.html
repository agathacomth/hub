<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8"><title>C002 · Story 09</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
body{width:1080px;height:1920px;background:radial-gradient(ellipse at 50% 40%,#06101f 0%,#020610 100%);font-family:'Inter',system-ui,sans-serif;color:#fff;overflow:hidden;position:relative}
.grid{position:absolute;inset:0;background-image:linear-gradient(rgba(15,37,64,0.2) 1px,transparent 1px),linear-gradient(90deg,rgba(15,37,64,0.2) 1px,transparent 1px);background-size:90px 90px;pointer-events:none}
.frame{position:absolute;inset:0;padding:280px 90px 240px;text-align:center}
.headline{font-size:80px;font-weight:900;line-height:1.1;letter-spacing:-0.02em;margin-bottom:80px}
.cyan{color:#4dd4ff}
.body{font-size:38px;font-weight:400;color:#8b9bb4;line-height:1.4;margin-bottom:120px}
.cta-text{font-size:46px;font-weight:800;color:#4dd4ff;letter-spacing:2px;margin-bottom:60px}
.bubble-wrap{display:flex;justify-content:center;align-items:flex-end;position:relative}
.bubble{width:240px;height:240px;background:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:140px;position:relative}
.bubble::after{content:'';position:absolute;bottom:8px;right:-12px;width:65px;height:46px;background:#fff;clip-path:polygon(0 0,100% 50%,0 100%)}
.logo{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);width:280px}
.logo img{width:100%;height:auto;display:block}
</style></head>
<body>
<div class="grid"></div>
<div class="frame">
  <div class="headline">199 em 295 donos disseram a <span class="cyan">mesma frase</span>.</div>
  <div class="body">Lê o carrossel completo no feed e comenta<br>a SUA versão de &ldquo;eu acho&rdquo;.</div>
  <div class="cta-text">DEIXA SEU &ldquo;EU ACHO&rdquo; NO POST</div>
  <div class="bubble-wrap"><div class="bubble">👇</div></div>
</div>
<div class="logo"><img src="../../png/logo.png" alt="Koncluí"/></div>
</body></html>
