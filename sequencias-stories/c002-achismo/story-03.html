<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8"><title>C002 · Story 03</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap');
body{width:1080px;height:1920px;background:radial-gradient(ellipse at 50% 40%,#06101f 0%,#020610 100%);font-family:'Inter',system-ui,sans-serif;color:#fff;overflow:hidden;position:relative}
.grid{position:absolute;inset:0;background-image:linear-gradient(rgba(15,37,64,0.2) 1px,transparent 1px),linear-gradient(90deg,rgba(15,37,64,0.2) 1px,transparent 1px);background-size:90px 90px;pointer-events:none}
.frame{position:absolute;inset:0;padding:280px 90px 240px}
.line1{font-size:88px;font-weight:900;line-height:1.1;letter-spacing:-0.02em;color:#8b9bb4;margin-bottom:30px}
.strike{position:relative;display:inline-block;color:#8b9bb4}
.strike::after{content:'';position:absolute;left:-6px;right:-6px;top:52%;height:8px;background:#ff5470;border-radius:4px;transform:rotate(-3deg)}
.line2{font-size:130px;font-weight:900;line-height:1.0;color:#fff;letter-spacing:-0.03em;margin-bottom:80px}
.body{font-size:42px;font-weight:400;color:#8b9bb4;line-height:1.4;margin-bottom:140px}
.callout{border-left:6px solid #4dd4ff;padding-left:40px;font-size:50px;font-weight:800;line-height:1.25;color:#fff}
.logo{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);width:280px}
.logo img{width:100%;height:auto;display:block}
</style></head>
<body>
<div class="grid"></div>
<div class="frame">
  <div class="line1">&ldquo;Eu acho&rdquo; não é<br><span class="strike">confiança</span>.</div>
  <div class="line2">É o oposto.</div>
  <div class="body">É a única coisa que sobra quando<br>o sistema não te dá certeza.</div>
  <div class="callout">Quem diz &ldquo;eu acho&rdquo;<br>já desistiu de saber.</div>
</div>
<div class="logo"><img src="../../png/logo.png" alt="Koncluí"/></div>
</body></html>
