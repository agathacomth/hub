<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8"><title>C002 · Story 08</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
body{width:1080px;height:1920px;background:radial-gradient(ellipse at 50% 40%,#06101f 0%,#020610 100%);font-family:'Inter',system-ui,sans-serif;color:#fff;overflow:hidden;position:relative}
.grid{position:absolute;inset:0;background-image:linear-gradient(rgba(15,37,64,0.2) 1px,transparent 1px),linear-gradient(90deg,rgba(15,37,64,0.2) 1px,transparent 1px);background-size:90px 90px;pointer-events:none}
.frame{position:absolute;inset:0;padding:280px 90px 240px}
.headline{font-size:84px;font-weight:900;line-height:1.1;letter-spacing:-0.02em;margin-bottom:60px}
.cyan{color:#4dd4ff}
.body{font-size:38px;font-weight:400;color:#8b9bb4;line-height:1.45;margin-bottom:140px}
.qbox{background:#fff;color:#9ca3af;border-radius:32px;padding:60px;width:820px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
.qbox .q{font-size:34px;font-weight:600;margin-bottom:50px}
.qbox .line{border-top:1.5px solid #d1d5db}
.logo{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);width:280px}
.logo img{width:100%;height:auto;display:block}
</style></head>
<body>
<div class="grid"></div>
<div class="frame">
  <div class="headline">Qual o <span class="cyan">&ldquo;eu acho&rdquo;</span> que mais te incomoda hoje?</div>
  <div class="body">Manda aqui. Nós lemos TODAS e respondemos<br>nas próximas séries de stories.<br>Sem julgamento.</div>
  <div class="qbox">
    <div class="q">Conta pra gente, sem filtro...</div>
    <div class="line"></div>
  </div>
</div>
<div class="logo"><img src="../../png/logo.png" alt="Koncluí"/></div>
</body></html>
