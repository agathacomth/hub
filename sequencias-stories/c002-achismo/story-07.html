<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8"><title>C002 · Story 07</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
body{width:1080px;height:1920px;background:radial-gradient(ellipse at 50% 40%,#06101f 0%,#020610 100%);font-family:'Inter',system-ui,sans-serif;color:#fff;overflow:hidden;position:relative}
.grid{position:absolute;inset:0;background-image:linear-gradient(rgba(15,37,64,0.2) 1px,transparent 1px),linear-gradient(90deg,rgba(15,37,64,0.2) 1px,transparent 1px);background-size:90px 90px;pointer-events:none}
.frame{position:absolute;inset:0;padding:200px 90px 240px}
.headline{font-size:68px;font-weight:900;line-height:1.1;letter-spacing:-0.02em;margin-bottom:30px;color:#fff}
.cyan{color:#4dd4ff}
.sub{font-size:34px;font-weight:500;color:#8b9bb4;line-height:1.4;margin-bottom:40px}
.image-wrap{position:relative;width:100%;height:980px;display:flex;justify-content:center;align-items:center;margin-top:20px}
.image-wrap::before{content:'';position:absolute;width:760px;height:760px;background:radial-gradient(circle,rgba(77,212,255,0.18) 0%,rgba(77,212,255,0.05) 40%,transparent 70%);border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);z-index:0}
.image-wrap img{width:100%;height:100%;object-fit:contain;position:relative;z-index:1;-webkit-mask-image:radial-gradient(ellipse at center,black 55%,transparent 92%);mask-image:radial-gradient(ellipse at center,black 55%,transparent 92%);filter:drop-shadow(0 30px 60px rgba(0,0,0,0.5))}
.caption{position:absolute;bottom:300px;left:90px;right:90px;text-align:center;font-size:32px;font-weight:700;color:#4dd4ff;letter-spacing:1px}
.logo{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);width:280px}
.logo img{width:100%;height:auto;display:block}
</style></head>
<body>
<div class="grid"></div>
<div class="frame">
  <div class="headline">Substituir o &ldquo;eu acho&rdquo;<br>pelo <span class="cyan">&ldquo;eu sei&rdquo;</span><br>leva 3 segundos por item.</div>
  <div class="sub">Foto. Hora. Responsável. Auditoria completa.</div>
  <div class="image-wrap">
    <img src="../../png/meus%20checklists%20(2).png" alt="App Koncluí"/>
  </div>
</div>
<div class="caption">FOTO · HORA · RESPONSÁVEL</div>
<div class="logo"><img src="../../png/logo.png" alt="Koncluí"/></div>
</body></html>
