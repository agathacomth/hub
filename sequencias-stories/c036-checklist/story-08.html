<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8"><title>C036 · Story 08</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
body{width:1080px;height:1920px;background:radial-gradient(ellipse at 50% 40%,#06101f 0%,#020610 100%);font-family:'Inter',system-ui,sans-serif;color:#fff;overflow:hidden;position:relative}
.grid{position:absolute;inset:0;background-image:linear-gradient(rgba(15,37,64,0.2) 1px,transparent 1px),linear-gradient(90deg,rgba(15,37,64,0.2) 1px,transparent 1px);background-size:90px 90px;pointer-events:none}
.frame{position:absolute;inset:0;padding:280px 90px 240px}
.headline{font-size:82px;font-weight:900;line-height:1.1;letter-spacing:-0.02em;color:#fff;margin-bottom:50px}
.body{font-size:34px;font-weight:400;color:#8b9bb4;line-height:1.45;margin-bottom:100px}
.poll{background:#fff;color:#1a1a1a;border-radius:32px;width:820px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
.poll .opt{padding:42px 60px;font-size:44px;font-weight:600}
.poll .opt+.opt{border-top:1px solid #e5e7eb}
.logo{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);width:280px}
.logo img{width:100%;height:auto;display:block}
</style></head>
<body>
<div class="grid"></div>
<div class="frame">
  <div class="headline">Você já tentou implantar checklist em papel?</div>
  <div class="body">Sem julgamento. A pergunta é só pra gente entender<br>quem tá do outro lado da tela.</div>
  <div class="poll">
    <div class="opt">Tentei e desisti 😩</div>
    <div class="opt">Nem tentei 🚫</div>
  </div>
</div>
<div class="logo"><img src="../../png/logo.png" alt="Koncluí"/></div>
</body></html>
