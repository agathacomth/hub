<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8"><title>C036 · Story 04</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap');
body{width:1080px;height:1920px;background:radial-gradient(ellipse at 50% 40%,#06101f 0%,#020610 100%);font-family:'Inter',system-ui,sans-serif;color:#fff;overflow:hidden;position:relative}
.grid{position:absolute;inset:0;background-image:linear-gradient(rgba(15,37,64,0.2) 1px,transparent 1px),linear-gradient(90deg,rgba(15,37,64,0.2) 1px,transparent 1px);background-size:90px 90px;pointer-events:none}
.frame{position:absolute;inset:0;padding:280px 90px 240px}
.quote-mark{font-family:Georgia,serif;font-size:220px;line-height:0.5;color:#4dd4ff;opacity:0.7;margin-bottom:60px}
.headline{font-size:140px;font-weight:900;line-height:1.0;letter-spacing:-0.03em;margin-bottom:0;color:#fff}
.quote-end{font-family:Georgia,serif;font-size:220px;line-height:0.3;color:#4dd4ff;opacity:0.7;text-align:right;margin-top:50px}
.body{font-size:36px;font-weight:400;color:#8b9bb4;line-height:1.45;margin-top:80px;margin-bottom:80px}
.callout{border-left:6px solid #4dd4ff;padding-left:40px;font-size:52px;font-weight:800;line-height:1.25;color:#fff}
.logo{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);width:280px}
.logo img{width:100%;height:auto;display:block}
</style></head>
<body>
<div class="grid"></div>
<div class="frame">
  <div class="quote-mark">&ldquo;</div>
  <div class="headline">Eu marco<br>depois.</div>
  <div class="quote-end">&rdquo;</div>
  <div class="body">Quando &ldquo;depois&rdquo; chega, ninguém lembra mais.<br>Marca tudo de uma vez. Sem foto. Sem hora.</div>
  <div class="callout">Isso não é checklist.<br>É ficção.</div>
</div>
<div class="logo"><img src="../../png/logo.png" alt="Koncluí"/></div>
</body></html>
