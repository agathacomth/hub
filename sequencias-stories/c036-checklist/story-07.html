<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8"><title>C036 · Story 07</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap');
body{width:1080px;height:1920px;background:radial-gradient(ellipse at 50% 40%,#06101f 0%,#020610 100%);font-family:'Inter',system-ui,sans-serif;color:#fff;overflow:hidden;position:relative}
.grid{position:absolute;inset:0;background-image:linear-gradient(rgba(15,37,64,0.2) 1px,transparent 1px),linear-gradient(90deg,rgba(15,37,64,0.2) 1px,transparent 1px);background-size:90px 90px;pointer-events:none}
.frame{position:absolute;inset:0;padding:280px 90px 240px}
.stats{display:flex;flex-direction:column;gap:80px}
.stat{padding-bottom:40px}
.stat.divider{border-bottom:2px solid #1a4a5c}
.stat-num{font-size:240px;font-weight:900;line-height:0.95;letter-spacing:-0.05em;margin-bottom:20px}
.stat-num.cyan{color:#4dd4ff}
.stat-num.white{color:#fff}
.stat-desc{font-size:38px;font-weight:600;color:#fff;line-height:1.3}
.source{font-size:28px;font-weight:500;color:#4dd4ff;text-align:center;margin-top:40px}
.logo{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);width:280px}
.logo img{width:100%;height:auto;display:block}
</style></head>
<body>
<div class="grid"></div>
<div class="frame">
  <div class="stats">
    <div class="stat divider">
      <div class="stat-num cyan">73%</div>
      <div class="stat-desc">dos donos mencionam o caderno<br>na primeira conversa com a gente.</div>
    </div>
    <div class="stat">
      <div class="stat-num white">−67%</div>
      <div class="stat-desc">falhas operacionais depois<br>da migração pro digital.</div>
    </div>
  </div>
  <div class="source">Base: 1.200 clientes Koncluí.</div>
</div>
<div class="logo"><img src="../../png/logo.png" alt="Koncluí"/></div>
</body></html>
