<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8"><title>C036 · Story 03</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap');
body{width:1080px;height:1920px;background:radial-gradient(ellipse at 50% 40%,#06101f 0%,#020610 100%);font-family:'Inter',system-ui,sans-serif;color:#fff;overflow:hidden;position:relative}
.grid{position:absolute;inset:0;background-image:linear-gradient(rgba(15,37,64,0.2) 1px,transparent 1px),linear-gradient(90deg,rgba(15,37,64,0.2) 1px,transparent 1px);background-size:90px 90px;pointer-events:none}
.frame{position:absolute;inset:0;padding:240px 90px 240px}
.headline{font-size:74px;font-weight:900;line-height:1.1;letter-spacing:-0.02em;color:#fff;margin-bottom:80px}
.timeline{position:relative;padding-left:0}
.tl-item{display:flex;align-items:flex-start;gap:36px;margin-bottom:30px;position:relative}
.tl-circle{width:110px;height:110px;border-radius:50%;border:4px solid;display:flex;align-items:center;justify-content:center;font-size:38px;font-weight:900;flex-shrink:0;background:#06101f;z-index:2}
.tl-text{flex:1;padding-top:30px;font-size:34px;font-weight:700;color:#fff;line-height:1.3}
.tl-line{position:absolute;left:53px;top:110px;bottom:-30px;width:4px;background:repeating-linear-gradient(to bottom,#1e3a5f 0,#1e3a5f 8px,transparent 8px,transparent 16px)}
.c1{color:#4dd4ff;border-color:#4dd4ff}
.c2{color:#8eb8d4;border-color:#8eb8d4}
.c3{color:#c08070;border-color:#c08070}
.c4{color:#ff5470;border-color:#ff5470}
.logo{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);width:280px}
.logo img{width:100%;height:auto;display:block}
</style></head>
<body>
<div class="grid"></div>
<div class="frame">
  <div class="headline">O ciclo do papel:</div>
  <div class="timeline">
    <div class="tl-item"><div class="tl-circle c1">S1</div><div class="tl-text">Tudo novo. Equipe motivada. Marcação rigorosa.</div><div class="tl-line"></div></div>
    <div class="tl-item"><div class="tl-circle c2">S2</div><div class="tl-text">Primeiro &ldquo;a gente fez, só não anotou&rdquo;.</div><div class="tl-line"></div></div>
    <div class="tl-item"><div class="tl-circle c3">S3</div><div class="tl-text">Folha amassou. Sumiu uma. Datas bagunçadas.</div><div class="tl-line"></div></div>
    <div class="tl-item"><div class="tl-circle c4">S4</div><div class="tl-text">Marcado tudo no fim do mês. Sem foto. Sem prova.</div></div>
  </div>
</div>
<div class="logo"><img src="../../png/logo.png" alt="Koncluí"/></div>
</body></html>
