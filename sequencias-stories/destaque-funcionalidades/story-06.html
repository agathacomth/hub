<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8"><title>Funcionalidades · Story 06</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap');
body{width:1080px;height:1920px;background:radial-gradient(ellipse at 50% 40%,#06101f 0%,#020610 100%);font-family:'Inter',system-ui,sans-serif;color:#fff;overflow:hidden;position:relative}
.grid{position:absolute;inset:0;background-image:linear-gradient(rgba(15,37,64,0.2) 1px,transparent 1px),linear-gradient(90deg,rgba(15,37,64,0.2) 1px,transparent 1px);background-size:90px 90px;pointer-events:none}
.frame{position:absolute;inset:0;padding:200px 90px 240px}
.counter{font-size:24px;font-weight:800;color:#4dd4ff;letter-spacing:4px;margin-bottom:30px}
.headline{font-size:74px;font-weight:900;line-height:1.05;letter-spacing:-0.02em;color:#fff;margin-bottom:20px}
.cyan{color:#4dd4ff}
.sub{font-size:32px;font-weight:500;color:#8b9bb4;line-height:1.4;margin-bottom:60px}
.image-wrap{position:relative;width:100%;background:#0f1f33;border:1px solid #1a4a5c;border-radius:24px;padding:30px;margin-bottom:40px;box-shadow:0 20px 50px rgba(0,0,0,0.4)}
.image-wrap img{width:100%;height:auto;display:block;border-radius:14px}
.callout{font-size:30px;font-weight:700;color:#fff;text-align:center;background:rgba(77,212,255,0.08);border:1px solid rgba(77,212,255,0.3);border-radius:18px;padding:24px 30px;line-height:1.4}
.callout .cyan{font-weight:900}
.logo{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);width:280px}
.logo img{width:100%;height:auto;display:block}
</style></head>
<body>
<div class="grid"></div>
<div class="frame">
  <div class="counter">05 / 08</div>
  <div class="headline">Agendamento <span class="cyan">automático</span>.</div>
  <div class="sub">Checklist recorrente sem ninguém precisar lembrar.<br>Define uma vez e roda pra sempre.</div>
  <div class="image-wrap"><img src="../../png/agendamento%20de%20atividades.png" alt="Agendamento de atividades"/></div>
  <div class="callout">Operação no <span class="cyan">piloto automático</span>.</div>
</div>
<div class="logo"><img src="../../png/logo.png" alt="Koncluí"/></div>
</body></html>
