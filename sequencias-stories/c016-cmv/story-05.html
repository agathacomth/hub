<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8"><title>C016 · Story 05</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap');
body{width:1080px;height:1920px;background:radial-gradient(ellipse at 50% 40%,#06101f 0%,#020610 100%);font-family:'Inter',system-ui,sans-serif;color:#fff;overflow:hidden;position:relative}
.grid{position:absolute;inset:0;background-image:linear-gradient(rgba(15,37,64,0.2) 1px,transparent 1px),linear-gradient(90deg,rgba(15,37,64,0.2) 1px,transparent 1px);background-size:90px 90px;pointer-events:none}
.frame{position:absolute;inset:0;padding:280px 90px 240px}
.mensal{font-size:66px;font-weight:700;line-height:1.15;color:#8b9bb4;margin-bottom:90px}
.semanal-big{font-size:140px;font-weight:900;line-height:1.0;color:#fff;letter-spacing:-0.03em;margin-bottom:20px}
.semanal-sub{font-size:66px;font-weight:700;color:#4dd4ff;line-height:1.15}
.body{font-size:34px;font-weight:400;color:#8b9bb4;line-height:1.45;margin-top:110px}
.logo{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);width:280px}
.logo img{width:100%;height:auto;display:block}
</style></head>
<body>
<div class="grid"></div>
<div class="frame">
  <div class="mensal">Mensal mostra<br>o estrago.</div>
  <div class="semanal-big">Semanal</div>
  <div class="semanal-sub">mostra o vazamento<br>enquanto ainda dá tempo.</div>
  <div class="body">Quem mede o CMV uma vez por semana fecha a diferença<br>em semanas, não em meses.</div>
</div>
<div class="logo"><img src="../../png/logo.png" alt="Koncluí"/></div>
</body></html>
