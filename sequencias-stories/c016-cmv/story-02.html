<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8"><title>C016 · Story 02</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
body{width:1080px;height:1920px;background:radial-gradient(ellipse at 50% 40%,#06101f 0%,#020610 100%);font-family:'Inter',system-ui,sans-serif;color:#fff;overflow:hidden;position:relative}
.grid{position:absolute;inset:0;background-image:linear-gradient(rgba(15,37,64,0.2) 1px,transparent 1px),linear-gradient(90deg,rgba(15,37,64,0.2) 1px,transparent 1px);background-size:90px 90px;pointer-events:none}
.frame{position:absolute;inset:0;padding:240px 90px 240px}
.title{font-size:60px;font-weight:900;line-height:1.1;color:#fff;margin-bottom:60px}
.cards{display:flex;gap:28px;margin-bottom:80px}
.card{flex:1;border-radius:24px;padding:34px 28px;min-height:400px;display:flex;flex-direction:column;justify-content:space-between}
.card.t{background:#0f2540;border:2px solid #1a4a5c}
.card.r{background:#2a0f1a;border:2px solid #5c1a2e}
.c-label{font-size:22px;font-weight:800;letter-spacing:3px;margin-bottom:24px}
.t .c-label{color:#4dd4ff}
.r .c-label{color:#ff5470}
.c-title{font-size:40px;font-weight:900;line-height:1.1;color:#fff;margin-bottom:20px}
.c-body{font-size:26px;font-weight:400;color:#8b9bb4;line-height:1.4}
.c-tag{font-size:22px;font-weight:600;margin-top:24px;font-style:italic}
.t .c-tag{color:#4dd4ff}
.r .c-tag{color:#ff5470}
.diff{text-align:center;margin-top:40px}
.diff-eq{font-size:80px;font-weight:900;color:#fff;margin-bottom:16px}
.diff-sub{font-size:54px;font-weight:700;color:#4dd4ff;line-height:1.2}
.logo{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);width:280px}
.logo img{width:100%;height:auto;display:block}
</style></head>
<body>
<div class="grid"></div>
<div class="frame">
  <div class="title">A diferença que come<br>seu lucro:</div>
  <div class="cards">
    <div class="card t">
      <div>
        <div class="c-label">CMV TEÓRICO</div>
        <div class="c-title">O que DEVIA sair.</div>
        <div class="c-body">Segundo a sua ficha técnica.</div>
      </div>
      <div class="c-tag">papel</div>
    </div>
    <div class="card r">
      <div>
        <div class="c-label">CMV REAL</div>
        <div class="c-title">O que de fato saiu.</div>
        <div class="c-body">Estoque inicial + compras − final.</div>
      </div>
      <div class="c-tag">o que o caixa sente</div>
    </div>
  </div>
  <div class="diff">
    <div class="diff-eq">Diferença =</div>
    <div class="diff-sub">o que sumiu sem você ver.</div>
  </div>
</div>
<div class="logo"><img src="../../png/logo.png" alt="Koncluí"/></div>
</body></html>
