<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8"><title>C016 · Story 01</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
body{width:1080px;height:1920px;background:radial-gradient(ellipse at 50% 40%,#06101f 0%,#020610 100%);font-family:'Inter',system-ui,sans-serif;color:#fff;overflow:hidden;position:relative}
.grid{position:absolute;inset:0;background-image:linear-gradient(rgba(15,37,64,0.2) 1px,transparent 1px),linear-gradient(90deg,rgba(15,37,64,0.2) 1px,transparent 1px);background-size:90px 90px;pointer-events:none}
.frame{position:absolute;inset:0;padding:280px 90px 240px}
.headline{font-size:70px;font-weight:900;line-height:1.15;letter-spacing:-0.02em;color:#fff;margin-bottom:80px}
.huge{font-size:340px;font-weight:900;line-height:0.9;color:#4dd4ff;letter-spacing:-0.06em;margin-bottom:40px}
.after{font-size:50px;font-weight:800;line-height:1.25;color:#fff}
.sub{font-size:34px;font-weight:400;color:#8b9bb4;line-height:1.4;margin-top:30px}
.logo{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);width:280px}
.logo img{width:100%;height:auto;display:block}
</style></head>
<body>
<div class="grid"></div>
<div class="frame">
  <div class="headline">Existe um número no seu restaurante que sangra lucro toda semana.</div>
  <div class="huge">CMV</div>
  <div class="after">E ninguém te avisa.</div>
  <div class="sub">Porque ninguém mede da forma certa.</div>
</div>
<div class="logo"><img src="../../png/logo.png" alt="Koncluí"/></div>
</body></html>
