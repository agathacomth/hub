<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8"><title>C016 · Story 06</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap');
body{width:1080px;height:1920px;background:radial-gradient(ellipse at 50% 40%,#06101f 0%,#020610 100%);font-family:'Inter',system-ui,sans-serif;color:#fff;overflow:hidden;position:relative}
.grid{position:absolute;inset:0;background-image:linear-gradient(rgba(15,37,64,0.2) 1px,transparent 1px),linear-gradient(90deg,rgba(15,37,64,0.2) 1px,transparent 1px);background-size:90px 90px;pointer-events:none}
.frame{position:absolute;inset:0;padding:240px 90px 240px}
.intro{font-size:50px;font-weight:600;color:#8b9bb4;margin-bottom:30px}
.big-num{font-size:280px;font-weight:900;line-height:0.95;color:#4dd4ff;letter-spacing:-0.06em;margin-bottom:20px}
.tag{font-size:50px;font-weight:800;color:#fff;line-height:1.2;margin-bottom:60px}
.chart-wrap{background:rgba(255,255,255,0.04);border:1px solid #1a4a5c;border-radius:24px;padding:24px;margin-bottom:40px;box-shadow:0 20px 50px rgba(0,0,0,0.4)}
.chart-wrap img{width:100%;height:auto;display:block;border-radius:16px}
.body{font-size:30px;font-weight:400;color:#8b9bb4;line-height:1.45}
.logo{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);width:280px}
.logo img{width:100%;height:auto;display:block}
</style></head>
<body>
<div class="grid"></div>
<div class="frame">
  <div class="intro">Cliente real Koncluí:</div>
  <div class="big-num">-4pp</div>
  <div class="tag">de diferença em 2 meses.</div>
  <div class="chart-wrap">
    <img src="../../png/Evolu%C3%A7%C3%A3o%20dos%20indicadores%20de%20desempenho.png" alt="Evolução dos indicadores"/>
  </div>
  <div class="body">Sem cortar prato. Sem mexer em preço.<br>Só medindo certo, com prova em foto.</div>
</div>
<div class="logo"><img src="../../png/logo.png" alt="Koncluí"/></div>
</body></html>
