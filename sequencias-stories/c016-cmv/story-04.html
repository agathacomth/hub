<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8"><title>C016 · Story 04</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
body{width:1080px;height:1920px;background:radial-gradient(ellipse at 50% 40%,#06101f 0%,#020610 100%);font-family:'Inter',system-ui,sans-serif;color:#fff;overflow:hidden;position:relative}
.grid{position:absolute;inset:0;background-image:linear-gradient(rgba(15,37,64,0.2) 1px,transparent 1px),linear-gradient(90deg,rgba(15,37,64,0.2) 1px,transparent 1px);background-size:90px 90px;pointer-events:none}
.frame{position:absolute;inset:0;padding:240px 90px 240px}
.headline{font-size:84px;font-weight:900;line-height:1.05;letter-spacing:-0.02em;margin-bottom:90px}
.item{display:flex;align-items:flex-start;gap:36px;margin-bottom:60px}
.num{font-size:104px;font-weight:900;color:#4dd4ff;line-height:1;flex-shrink:0;width:170px;letter-spacing:-0.04em}
.item-text{flex:1;padding-top:18px}
.item-title{font-size:42px;font-weight:800;color:#fff;line-height:1.15;margin-bottom:12px}
.item-desc{font-size:30px;font-weight:400;color:#8b9bb4;line-height:1.4}
.logo{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);width:280px}
.logo img{width:100%;height:auto;display:block}
</style></head>
<body>
<div class="grid"></div>
<div class="frame">
  <div class="headline">3 fontes da diferença:</div>
  <div class="item"><div class="num">01</div><div class="item-text"><div class="item-title">Desperdício na produção</div><div class="item-desc">Cebola perdida, molho refeito, carne sobre-cocida.</div></div></div>
  <div class="item"><div class="num">02</div><div class="item-text"><div class="item-title">Consumo interno não registrado</div><div class="item-desc">Equipe come, dono experimenta. Ninguém anota.</div></div></div>
  <div class="item"><div class="num">03</div><div class="item-text"><div class="item-title">Ficha técnica errada</div><div class="item-desc">A porção real é maior que a do papel. Há anos.</div></div></div>
</div>
<div class="logo"><img src="../../png/logo.png" alt="Koncluí"/></div>
</body></html>
