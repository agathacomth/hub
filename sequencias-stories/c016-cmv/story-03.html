<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8"><title>C016 · Story 03</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap');
body{width:1080px;height:1920px;background:radial-gradient(ellipse at 50% 40%,#06101f 0%,#020610 100%);font-family:'Inter',system-ui,sans-serif;color:#fff;overflow:hidden;position:relative}
.grid{position:absolute;inset:0;background-image:linear-gradient(rgba(15,37,64,0.2) 1px,transparent 1px),linear-gradient(90deg,rgba(15,37,64,0.2) 1px,transparent 1px);background-size:90px 90px;pointer-events:none}
.frame{position:absolute;inset:0;padding:280px 90px 240px}
.intro{font-size:46px;font-weight:500;color:#8b9bb4;line-height:1.3;margin-bottom:70px}
.line{font-size:90px;font-weight:900;line-height:1.1;letter-spacing:-0.02em;margin-bottom:20px}
.hl{background:#1a4a5c;padding:4px 18px;border-radius:6px;color:#4dd4ff}
.body{font-size:38px;font-weight:400;color:#8b9bb4;line-height:1.4;margin-top:80px;margin-bottom:120px}
.callout{border-left:6px solid #4dd4ff;padding-left:40px;font-size:48px;font-weight:800;line-height:1.25;color:#fff}
.logo{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);width:280px}
.logo img{width:100%;height:auto;display:block}
</style></head>
<body>
<div class="grid"></div>
<div class="frame">
  <div class="intro">Se o CMV real é MAIOR que o teórico…</div>
  <div class="line">Alguma coisa saiu</div>
  <div class="line"><span class="hl">sem virar venda</span>.</div>
  <div class="body">Pode ser desperdício. Pode ser consumo interno não anotado. Pode ser ficha técnica errada.</div>
  <div class="callout">Em todos os casos,<br>é dinheiro que NÃO voltou.</div>
</div>
<div class="logo"><img src="../../png/logo.png" alt="Koncluí"/></div>
</body></html>
