<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8"><title>Marca · Story 09</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
body{width:1080px;height:1920px;background:radial-gradient(ellipse at 50% 40%,#06101f 0%,#020610 100%);font-family:'Inter',system-ui,sans-serif;color:#fff;overflow:hidden;position:relative}
.grid{position:absolute;inset:0;background-image:linear-gradient(rgba(15,37,64,0.2) 1px,transparent 1px),linear-gradient(90deg,rgba(15,37,64,0.2) 1px,transparent 1px);background-size:90px 90px;pointer-events:none}
.frame{position:absolute;inset:0;padding:280px 90px 240px;text-align:center}
.intro{font-size:42px;font-weight:500;color:#8b9bb4;line-height:1.3;margin-bottom:50px}
.headline{font-size:92px;font-weight:900;line-height:1.1;letter-spacing:-0.02em;color:#fff;margin-bottom:70px}
.cyan{color:#4dd4ff}
.body{font-size:36px;font-weight:400;color:#8b9bb4;line-height:1.45;margin-bottom:80px}
.cta-btn{background:#4dd4ff;color:#06101f;padding:42px 60px;border-radius:80px;font-size:46px;font-weight:900;display:inline-block;letter-spacing:2px;box-shadow:0 20px 50px rgba(77,212,255,0.4);margin-bottom:60px}
.bubble{width:220px;height:220px;background:#fff;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:130px;position:relative;margin:0 auto}
.bubble::after{content:'';position:absolute;bottom:5px;right:-12px;width:60px;height:42px;background:#fff;clip-path:polygon(0 0,100% 50%,0 100%)}
.note{font-size:28px;font-weight:500;color:#8b9bb4;margin-top:40px;font-style:italic}
.logo{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);width:280px}
.logo img{width:100%;height:auto;display:block}
</style></head>
<body>
<div class="grid"></div>
<div class="frame">
  <div class="intro">Curtiu o que viu?</div>
  <div class="headline">Vamos conversar.<br><span class="cyan">Sem papo de vendedor.</span></div>
  <div class="body">20 minutos com nosso time pra entender<br>o que muda na sua operação.</div>
  <div class="cta-btn">Comenta DEMO 💬</div>
  <div><div class="bubble">👇</div></div>
  <div class="note">A gente te chama no direct.</div>
</div>
<div class="logo"><img src="../../png/logo.png" alt="Koncluí"/></div>
</body></html>
