<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8"><title>Marca · Story 04</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap');
body{width:1080px;height:1920px;background:radial-gradient(ellipse at 50% 40%,#06101f 0%,#020610 100%);font-family:'Inter',system-ui,sans-serif;color:#fff;overflow:hidden;position:relative}
.grid{position:absolute;inset:0;background-image:linear-gradient(rgba(15,37,64,0.2) 1px,transparent 1px),linear-gradient(90deg,rgba(15,37,64,0.2) 1px,transparent 1px);background-size:90px 90px;pointer-events:none}
.frame{position:absolute;inset:0;padding:280px 90px 240px}
.intro{font-size:46px;font-weight:500;color:#8b9bb4;margin-bottom:40px}
.headline{font-size:88px;font-weight:900;line-height:1.05;letter-spacing:-0.02em;color:#fff;margin-bottom:30px}
.hl{background:#1a4a5c;padding:4px 18px;border-radius:6px;color:#4dd4ff}
.body{font-size:34px;font-weight:400;color:#8b9bb4;line-height:1.45;margin-top:70px}
.body strong{color:#fff;font-weight:700}
.logo{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);width:280px}
.logo img{width:100%;height:auto;display:block}
</style></head>
<body>
<div class="grid"></div>
<div class="frame">
  <div class="intro">O que a gente faz:</div>
  <div class="headline">Transforma o caos<br>da operação em</div>
  <div class="headline"><span class="hl">excelência replicável</span>.</div>
  <div class="body">Pra <strong>dono</strong> que tá cansado de descobrir problema pela reclamação.<br>Pra <strong>gerente</strong> que cansou de virar bombeiro todo dia.<br>Pra <strong>rede</strong> que quer escalar sem perder o padrão.</div>
</div>
<div class="logo"><img src="../../png/logo.png" alt="Koncluí"/></div>
</body></html>
