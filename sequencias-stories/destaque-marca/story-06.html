<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8"><title>Marca · Story 06</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap');
body{width:1080px;height:1920px;background:radial-gradient(ellipse at 50% 40%,#06101f 0%,#020610 100%);font-family:'Inter',system-ui,sans-serif;color:#fff;overflow:hidden;position:relative}
.grid{position:absolute;inset:0;background-image:linear-gradient(rgba(15,37,64,0.2) 1px,transparent 1px),linear-gradient(90deg,rgba(15,37,64,0.2) 1px,transparent 1px);background-size:90px 90px;pointer-events:none}
.frame{position:absolute;inset:0;padding:240px 90px 240px}
.headline{font-size:66px;font-weight:900;line-height:1.1;color:#fff;margin-bottom:50px}
.cyan{color:#4dd4ff}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:24px}
.stat{background:#0f1f33;border:1px solid #1a4a5c;border-radius:22px;padding:36px 32px;text-align:center}
.s-num{font-size:120px;font-weight:900;line-height:0.95;letter-spacing:-0.05em;color:#4dd4ff;margin-bottom:14px}
.s-num.white{color:#fff}
.s-desc{font-size:26px;font-weight:600;color:#fff;line-height:1.3}
.source{font-size:28px;font-weight:500;color:#8b9bb4;text-align:center;margin-top:50px;font-style:italic}
.logo{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);width:280px}
.logo img{width:100%;height:auto;display:block}
</style></head>
<body>
<div class="grid"></div>
<div class="frame">
  <div class="headline">Os <span class="cyan">números</span> da base.<br>Sem ficção.</div>
  <div class="stats">
    <div class="stat"><div class="s-num">−67%</div><div class="s-desc">falhas operacionais</div></div>
    <div class="stat"><div class="s-num white">350%</div><div class="s-desc">ROI médio</div></div>
    <div class="stat"><div class="s-num">8+</div><div class="s-desc">NPS</div></div>
    <div class="stat"><div class="s-num white">&lt;3%</div><div class="s-desc">churn anual</div></div>
  </div>
  <div class="source">Média real da base de 1.200 clientes.</div>
</div>
<div class="logo"><img src="../../png/logo.png" alt="Koncluí"/></div>
</body></html>
