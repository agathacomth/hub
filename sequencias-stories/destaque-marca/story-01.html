<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8"><title>Marca · Story 01</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap');
body{width:1080px;height:1920px;background:radial-gradient(ellipse at 50% 40%,#06101f 0%,#020610 100%);font-family:'Inter',system-ui,sans-serif;color:#fff;overflow:hidden;position:relative}
.grid{position:absolute;inset:0;background-image:linear-gradient(rgba(15,37,64,0.2) 1px,transparent 1px),linear-gradient(90deg,rgba(15,37,64,0.2) 1px,transparent 1px);background-size:90px 90px;pointer-events:none}
.frame{position:absolute;inset:0;padding:280px 90px 240px}
.intro{font-size:42px;font-weight:500;color:#8b9bb4;line-height:1.3;margin-bottom:60px}
.headline{font-size:90px;font-weight:900;line-height:1.05;letter-spacing:-0.02em;color:#fff;margin-bottom:80px}
.cyan{color:#4dd4ff}
.huge{font-size:280px;font-weight:900;line-height:0.95;color:#4dd4ff;letter-spacing:-0.05em;margin-bottom:30px}
.sub{font-size:38px;font-weight:600;color:#fff;line-height:1.3}
.note{font-size:30px;font-weight:400;color:#8b9bb4;line-height:1.4;margin-top:50px;font-style:italic}
.logo{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);width:280px}
.logo img{width:100%;height:auto;display:block}
</style></head>
<body>
<div class="grid"></div>
<div class="frame">
  <div class="intro">Antes de você seguir o perfil,</div>
  <div class="headline">deixa a gente te apresentar<br>quem é a <span class="cyan">Koncluí</span>.</div>
  <div class="huge">1.200</div>
  <div class="sub">restaurantes hoje na base.</div>
  <div class="note">E a mesma coisa muda nos primeiros 30 dias em quase todos eles.</div>
</div>
<div class="logo"><img src="../../png/logo.png" alt="Koncluí"/></div>
</body></html>
