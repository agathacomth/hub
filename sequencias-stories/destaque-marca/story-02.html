<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8"><title>Marca · Story 02</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap');
body{width:1080px;height:1920px;background:radial-gradient(ellipse at 50% 40%,#06101f 0%,#020610 100%);font-family:'Inter',system-ui,sans-serif;color:#fff;overflow:hidden;position:relative}
.grid{position:absolute;inset:0;background-image:linear-gradient(rgba(15,37,64,0.2) 1px,transparent 1px),linear-gradient(90deg,rgba(15,37,64,0.2) 1px,transparent 1px);background-size:90px 90px;pointer-events:none}
.frame{position:absolute;inset:0;padding:280px 90px 240px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center}
.intro{font-size:50px;font-weight:500;color:#8b9bb4;margin-bottom:80px}
.brand-img{width:780px;margin-bottom:60px;filter:drop-shadow(0 20px 50px rgba(77,212,255,0.3))}
.brand-img img{width:100%;height:auto;display:block}
.tagline{font-size:42px;font-weight:700;color:#4dd4ff;line-height:1.3;letter-spacing:0.5px}
.note{font-size:32px;font-weight:400;color:#8b9bb4;line-height:1.4;margin-top:60px;font-style:italic}
.logo{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);width:280px;opacity:0.4}
.logo img{width:100%;height:auto;display:block}
</style></head>
<body>
<div class="grid"></div>
<div class="frame">
  <div class="intro">A gente é a</div>
  <div class="brand-img"><img src="../../png/logo.png" alt="Koncluí"/></div>
  <div class="tagline">Seu restaurante, no padrão. Sempre.</div>
  <div class="note">Existimos pra que a paixão pela gastronomia<br>não seja destruída pela complexidade da gestão.</div>
</div>
<div class="logo"><img src="../../png/logo.png" alt=""/></div>
</body></html>
